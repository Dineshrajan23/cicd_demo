name: Frontend CI/CD Pipeline (Dockerized)

on:
  pull_request:
    branches:
      - develop
      - staging
      - production
  push:
    branches:
      - develop
      - staging
      - production
  workflow_dispatch:
    inputs:
      rollback_image_tag:
        description: 'Docker Image Tag to rollback to (e.g., commit SHA)'
        required: false
        type: string
        default: ''
      environment:
        description: 'Target environment for rollback (e.g., dev, staging, production)'
        required: true
        type: choice
        options:
          - develop
          - staging
          - production
        default: 'production'

permissions:
  contents: read
  actions: write
  pull-requests: write
  deployments: write

jobs:
  ci:
    name: Continuous Integration Checks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESLint
        run: npm run lint #welcome to the world of linting!
        
      # - name: Run unit tests
      #   run: npm test

  cd:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Set Image Tag and ECR URI
        id: image_vars
        run: |
          IMAGE_TAG="${{ github.sha }}"
          ECR_URI="${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_NAME }}"
          echo "ECR_URI=$ECR_URI" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build and push Docker image to ECR
        run: |
          docker build -t ${{ steps.image_vars.outputs.ECR_URI }}:${{ steps.image_vars.outputs.IMAGE_TAG }} .
          docker push ${{ steps.image_vars.outputs.ECR_URI }}:${{ steps.image_vars.outputs.IMAGE_TAG }}
          if [[ "${{ github.ref }}" == "refs/heads/production" ]]; then
            docker tag ${{ steps.image_vars.outputs.ECR_URI }}:${{ steps.image_vars.outputs.IMAGE_TAG }} ${{ steps.image_vars.outputs.ECR_URI}}:latest
            docker push ${{ steps.image_vars.outputs.ECR_URI }}:latest
          fi

      - name: Set deployment variables and deploy to EC2
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            SERVER_IP=${{ secrets.DEV_SERVER_IP }}
            SSH_KEY=${{ secrets.DEV_EC2_SSH_KEY }}
            CONTAINER_NAME="nextjs-dev"
            HOST_PORT=3000
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            SERVER_IP=${{ secrets.STAGING_SERVER_IP }}
            SSH_KEY=${{ secrets.STAGING_EC2_SSH_KEY }}
            CONTAINER_NAME="nextjs-staging"
            HOST_PORT=3000
          elif [[ "${{ github.ref }}" == "refs/heads/production" ]]; then
            SERVER_IP=${{ secrets.PROD_SERVER_IP }}
            SSH_KEY=${{ secrets.PROD_EC2_SSH_KEY }}
            CONTAINER_NAME="nextjs-prod"
            HOST_PORT=80
          else
            exit 1
          fi
          
          IMAGE_TO_DEPLOY="${{ steps.image_vars.outputs.ECR_URI }}:${{ steps.image_vars.outputs.IMAGE_TAG }}"
          APP_PORT=3000
          
          echo "${SSH_KEY}" > key.pem
          chmod 600 key.pem
          
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.DEPLOY_USER }}@${SERVER_IP} << EOF
            docker pull "${IMAGE_TO_DEPLOY}"
            docker stop "${CONTAINER_NAME}" || true
            docker rm "${CONTAINER_NAME}" || true
            docker run -d --name "${CONTAINER_NAME}" -p "${HOST_PORT}":"${APP_PORT}" "${IMAGE_TO_DEPLOY}"
            docker image prune -f
          EOF
          
          rm key.pem

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.rollback_image_tag != ''
    
    steps:
      - name: Configure AWS credentials for rollback
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR for rollback
        id: login-ecr-rollback
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Set rollback deployment variables
        id: vars
        run: |
          ECR_URI="${{ steps.login-ecr-rollback.outputs.registry }}/${{ secrets.ECR_REPOSITORY_NAME }}"
          echo "ECR_URI=$ECR_URI" >> $GITHUB_OUTPUT
          echo "ROLLBACK_IMAGE_TAG=${{ github.event.inputs.rollback_image_tag }}" >> $GITHUB_OUTPUT

          if [[ "${{ github.event.inputs.environment }}" == "develop" ]]; then
            echo "SERVER_IP=${{ secrets.DEV_SERVER_IP }}" >> $GITHUB_OUTPUT
            echo "SSH_KEY=${{ secrets.DEV_EC2_SSH_KEY }}" >> $GITHUB_OUTPUT
            echo "CONTAINER_NAME=nextjs-dev" >> $GITHUB_OUTPUT
            echo "HOST_PORT=3000" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.inputs.environment }}" == "staging" ]]; then
            echo "SERVER_IP=${{ secrets.STAGING_SERVER_IP }}" >> $GITHUB_OUTPUT
            echo "SSH_KEY=${{ secrets.STAGING_EC2_SSH_KEY }}" >> $GITHUB_OUTPUT
            echo "CONTAINER_NAME=nextjs-staging" >> $GITHUB_OUTPUT
            echo "HOST_PORT=3000" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "SERVER_IP=${{ secrets.PROD_SERVER_IP }}" >> $GITHUB_OUTPUT
            echo "SSH_KEY=${{ secrets.PROD_EC2_SSH_KEY }}" >> $GITHUB_OUTPUT
            echo "CONTAINER_NAME=nextjs-prod" >> $GITHUB_OUTPUT
            echo "HOST_PORT=80" >> $GITHUB_OUTPUT
          else
            exit 1
          fi
          echo "APP_PORT=3000" >> $GITHUB_OUTPUT

      - name: Perform Rollback Deployment to EC2
        run: |
          ROLLBACK_IMAGE="${{ steps.vars.outputs.ECR_URI }}:${{ steps.vars.outputs.ROLLBACK_IMAGE_TAG }}"
          CONTAINER_NAME="${{ steps.vars.outputs.CONTAINER_NAME }}"
          HOST_PORT="${{ steps.vars.outputs.HOST_PORT }}"
          APP_PORT="${{ steps.vars.outputs.APP_PORT }}"
          
          echo "${{ steps.vars.outputs.SSH_KEY }}" > key.pem
          chmod 600 key.pem

          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.DEPLOY_USER }}@${{ steps.vars.outputs.SERVER_IP }} << EOF
            docker pull "${ROLLBACK_IMAGE}"
            docker stop "${CONTAINER_NAME}" || true
            docker rm "${CONTAINER_NAME}" || true
            docker run -d --name "${CONTAINER_NAME}" -p "${HOST_PORT}":"${APP_PORT}" "${ROLLBACK_IMAGE}"
            docker image prune -f
          EOF
          
          rm key.pem

  email-notification:
    name: Send Email Notification
    runs-on: ubuntu-latest
    needs: [cd]
    if: always()
    steps:
      - name: Get status of CD job
        id: cd_status
        run: echo "status=${{ needs.cd.result }}" >> $GITHUB_OUTPUT
      
      - name: Determine email subject and message
        id: email_content
        run: |
          if [ "${{ needs.cd.result }}" == "success" ]; then
            SUBJECT="✅ CD Success: Frontend Deployment to ${{ github.ref_name }}"
            MESSAGE="The deployment to ${{ github.ref_name }} was successful. The app is live."
          else
            SUBJECT="❌ CD Failure: Frontend Deployment to ${{ github.ref_name }}"
            MESSAGE="The deployment to ${{ github.ref_name }} failed. Please check the workflow run for details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          echo "subject=$SUBJECT" >> $GITHUB_OUTPUT
          echo "message=$MESSAGE" >> $GITHUB_OUTPUT
      
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.EMAIL_SERVER }}
          server_port: ${{ secrets.EMAIL_PORT }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: ${{ steps.email_content.outputs.subject }}
          body: ${{ steps.email_content.outputs.message }}
          to: ${{ secrets.EMAIL_RECIPIENTS }}
          from: GitHub Actions <actions@github.com>