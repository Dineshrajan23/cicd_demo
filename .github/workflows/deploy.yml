name: Frontend CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - staging
      - main 
  pull_request: # Good practice to lint/test PRs before merging
    branches:
      - dev
      - staging
      - main
  workflow_dispatch:
    inputs:
      rollback_tag:
        description: 'Git tag to rollback to for Production environment'
        required: false
        type: string
        default: ''
      environment:
        description: 'Target environment for rollback (e.g., dev, staging, production)'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
        default: 'production'


permissions:
  contents: read # Allow checkout
  actions: write # Allow workflow_dispatch for rollback
  pull-requests: write # For status checks if you add them later
  deployments: write # For environment tracking

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm' # Cache node_modules to speed up builds

      - name: Install dependencies
        run: |
          echo "--- Installing NPM dependencies ---"
          npm ci
          echo "--- NPM dependencies installed ---"

      - name: Run Lint
        run: |
          echo "--- Running ESLint ---"
          npm run lint
          echo "--- ESLint finished ---"

      - name: Build Next.js Application and Archive
        run: |
          echo "--- Starting Next.js build ---"
          npm run build
          echo "--- Next.js build completed successfully. ---"
          echo "--- Verifying .next directory content ---"
          ls -la .next || { echo ".next directory was not created during build. Build failed?"; exit 1; }

          # --- NEW STEP: Archive the .next directory ---
          echo "--- Archiving .next directory to frontend-build.tar.gz ---"
          # Ensure you are in the correct directory. 'tar -C' changes directory before archiving.
          # We want to archive the .next directory, relative to the current working directory.
          tar -czf frontend-build.tar.gz .next/
          echo "--- Archive created successfully. Listing archive details: ---"
          ls -lh frontend-build.tar.gz || { echo "Failed to create archive!"; exit 1; }
          # --- END NEW STEP ---

      # - name: Run Tests # Uncomment if you have tests (e.g., Jest, React Testing Library)
      #   run: |
      #     echo "--- Running tests ---"
      #     npm test
      #     echo "--- Tests completed ---"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build # Artifact name remains the same
          path: frontend-build.tar.gz # NOW UPLOAD THE ARCHIVE FILE
          if-no-files-found: error
          compression-level: 0 # No need for action to compress already compressed file
          overwrite: true

  deploy:
    name: Deploy to ${{ github.ref == 'refs/heads/main' && 'Production' || (github.ref == 'refs/heads/staging' && 'Staging' || 'Development') }}
    needs: build
    runs-on: ubuntu-latest
    # Manual approval for production
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || (github.ref == 'refs/heads/staging' && 'staging' || 'development') }}
      url: ${{ github.ref == 'refs/heads/main' && 'https://your-production-url.com' || github.ref == 'refs/heads/staging' && 'https://your-staging-url.com' || 'https://your-dev-url.com' }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ./downloaded-build

      - name: Extract downloaded artifact
        run: |
          echo "--- Extracting downloaded build artifact ---"
          # Verify the tarball exists within the downloaded-build directory
          ls -la ./downloaded-build/frontend-build.tar.gz || { echo "Downloaded artifact (frontend-build.tar.gz) not found in ./downloaded-build!"; exit 1; }

          # Extract the tarball. The -C flag tells tar to change directory before extracting.
          # The .next directory was archived from the root of the build context,
          # so extracting it will put it directly into ./downloaded-build/.next
          tar -xzf ./downloaded-build/frontend-build.tar.gz -C ./downloaded-build/
          echo "--- Artifact extracted. Listing contents of ./downloaded-build: ---"
          ls -la ./downloaded-build/ # Verify the .next directory is now there
          echo "--- Verifying extracted .next directory: ---"
          ls -la ./downloaded-build/.next || { echo "Extracted .next directory not found in ./downloaded-build!"; exit 1; }
          
          # Optional: Clean up the tarball after extraction on the runner
          rm ./downloaded-build/frontend-build.tar.gz
          echo "--- Artifact extraction verified and tarball cleaned up ---"

      - name: Set deployment variables
        id: vars # Used to output variables for later steps
        run: |
          echo "--- Setting deployment variables based on branch ---"
          if [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            echo "DEPLOY_ENV=dev" >> $GITHUB_OUTPUT
            echo "SERVER_IP=${{ secrets.DEV_SERVER_IP }}" >> $GITHUB_OUTPUT
            echo "SSH_KEY=${{ secrets.DEV_EC2_SSH_KEY }}" >> $GITHUB_OUTPUT
            echo "APP_DIR=${{ secrets.DEV_APP_DIR }}" >> $GITHUB_OUTPUT # e.g., /var/www/dev-app
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "DEPLOY_ENV=staging" >> $GITHUB_OUTPUT
            echo "SERVER_IP=${{ secrets.STAGING_SERVER_IP }}" >> $GITHUB_OUTPUT
            echo "SSH_KEY=${{ secrets.STAGING_EC2_SSH_KEY }}" >> $GITHUB_OUTPUT
            echo "APP_DIR=${{ secrets.STAGING_APP_DIR }}" >> $GITHUB_OUTPUT # e.g., /var/www/staging-app
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "DEPLOY_ENV=production" >> $GITHUB_OUTPUT
            echo "SERVER_IP=${{ secrets.PROD_SERVER_IP }}" >> $GITHUB_OUTPUT
            echo "SSH_KEY=${{ secrets.PROD_EC2_SSH_KEY }}" >> $GITHUB_OUTPUT
            echo "APP_DIR=${{ secrets.PROD_APP_DIR }}" >> $GITHUB_OUTPUT # e.g., /var/www/your-app
          else
            echo "Unknown branch ref: ${{ github.ref }}. Exiting."
            exit 1
          fi
          echo "--- Deployment variables set ---"

      - name: Save Git Tag for Production (only on main branch)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "--- Tagging production deployment ---"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG_NAME="prod-release-$(date +'%Y%m%d%H%M%S')-${{ github.sha }}"
          git tag $TAG_NAME
          git push origin $TAG_NAME
          echo "--- Production deployment tagged: $TAG_NAME ---"
          # Store the tag name for potential use in deployment status/monitoring
          echo "PROD_DEPLOY_TAG=$TAG_NAME" >> $GITHUB_OUTPUT # Not used directly in this workflow, but useful

      - name: Deploy to EC2 via SCP and SSH
        run: |
          echo "--- Starting deployment to EC2 instance: ${{ steps.vars.outputs.SERVER_IP }} ---"
          echo "${{ steps.vars.outputs.SSH_KEY }}" > key.pem
          chmod 600 key.pem

          # No need to tarball again, the .next folder is now extracted in ./downloaded-build/
          # We will tar it again for transfer to the server for a clean transfer.
          echo "--- Creating tarball of extracted .next for transfer to EC2 ---"
          # Archive the .next directory from inside downloaded-build
          tar -czf next_for_transfer.tar.gz -C ./downloaded-build .next
          echo "--- Tarball for transfer created ---"

          # Transfer the tarball to the EC2 instance
          echo "--- Transferring build artifact to EC2 ---"
          scp -o StrictHostKeyChecking=no -i key.pem next_for_transfer.tar.gz ${{ secrets.DEPLOY_USER }}@${{ steps.vars.outputs.SERVER_IP }}:/tmp/next_for_transfer.tar.gz
          echo "--- Artifact transferred ---"

          # SSH into the EC2 instance and perform deployment steps
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.DEPLOY_USER }}@${{ steps.vars.outputs.SERVER_IP }} << 'EOF'
            APP_DIR="${{ steps.vars.outputs.APP_DIR }}"
            TIMESTAMP=$(date +'%Y%m%d%H%M%S')
            BACKUP_DIR="$HOME/backups/${APP_DIR##*/}-backup-$TIMESTAMP"
            BUILD_TARBALL="/tmp/next_for_transfer.tar.gz"

            echo "Server: Starting deployment for application in \$APP_DIR"

            if [ -d "\$APP_DIR" ]; then
                echo "Server: Current application directory found. Creating backup to \$BACKUP_DIR"
                mkdir -p "\$BACKUP_DIR"
                cp -r "\$APP_DIR/.next" "\$BACKUP_DIR/" 2>/dev/null || echo "Server: .next folder not found in current deployment, skipping .next backup."
                cp "\$APP_DIR/package.json" "\$BACKUP_DIR/" 2>/dev/null || echo "Server: package.json not found, skipping backup."
                cp "\$APP_DIR/next.config.ts" "\$BACKUP_DIR/" 2>/dev/null || echo "Server: next.config.ts not found, skipping backup."
                cp -r "\$APP_DIR/public" "\$BACKUP_DIR/" 2>/dev/null || echo "Server: public folder not found, skipping backup."
                echo "Server: Backup completed."
            else
                echo "Server: Application directory \$APP_DIR does not exist. Creating it."
                mkdir -p "\$APP_DIR"
            fi

            echo "Server: Removing old .next folder and extracting new build from \$BUILD_TARBALL"
            rm -rf "\$APP_DIR/.next"
            tar -xzf "\$BUILD_TARBALL" -C "\$APP_DIR"

            echo "Server: Cleaning up build tarball: \$BUILD_TARBALL"
            rm "\$BUILD_TARBALL"

            echo "Server: Attempting to restart PM2 process 'your-app'..."
            pm2 restart your-app || \
            (echo "Server: PM2 process 'your-app' not found or failed to restart. Attempting to start as new process." && \
             pm2 start npm --name your-app -- run start --cwd "\$APP_DIR") || \
             echo "Server: Failed to manage PM2 process. Manual intervention may be required."

            echo "Server: Deployment process completed successfully for \${APP_DIR}."
          EOF
          echo "--- Deployment to EC2 finished ---"
          rm key.pem
          rm next_for_transfer.tar.gz # Clean up the tarball on the runner

  rollback:
    name: Rollback Deployment
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.rollback_tag != ''
    runs-on: ubuntu-latest
    needs: build 

    steps:
      - name: Checkout specified tag for rollback
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.rollback_tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies for rollback build
        run: |
          echo "--- Installing dependencies for rollback build ---"
          npm ci
          echo "--- Dependencies installed ---"

      - name: Build application for rollback
        run: |
          echo "--- Building application for rollback from tag: ${{ github.event.inputs.rollback_tag }} ---"
          npm run build
          echo "--- Rollback build completed ---"
          ls -la .next || { echo ".next directory was not created during rollback build. Build failed?"; exit 1; }

      - name: Set rollback deployment variables
        id: vars
        run: |
          echo "--- Setting rollback variables for environment: ${{ github.event.inputs.environment }} ---"
          if [[ "${{ github.event.inputs.environment }}" == "dev" ]]; then
            echo "SERVER_IP=${{ secrets.DEV_SERVER_IP }}" >> $GITHUB_OUTPUT
            echo "SSH_KEY=${{ secrets.DEV_EC2_SSH_KEY }}" >> $GITHUB_OUTPUT
            echo "APP_DIR=${{ secrets.DEV_APP_DIR }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.inputs.environment }}" == "staging" ]]; then
            echo "SERVER_IP=${{ secrets.STAGING_SERVER_IP }}" >> $GITHUB_OUTPUT
            echo "SSH_KEY=${{ secrets.STAGING_EC2_SSH_KEY }}" >> $GITHUB_OUTPUT
            echo "APP_DIR=${{ secrets.STAGING_APP_DIR }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "SERVER_IP=${{ secrets.PROD_SERVER_IP }}" >> $GITHUB_OUTPUT
            echo "SSH_KEY=${{ secrets.PROD_EC2_SSH_KEY }}" >> $GITHUB_OUTPUT
            echo "APP_DIR=${{ secrets.PROD_APP_DIR }}" >> $GITHUB_OUTPUT
          else
            echo "Invalid environment for rollback: ${{ github.event.inputs.environment }}. Exiting."
            exit 1
          fi
          echo "--- Rollback variables set ---"

      - name: Perform Rollback Deployment to EC2
        run: |
          echo "--- Starting rollback deployment to EC2 instance: ${{ steps.vars.outputs.SERVER_IP }} ---"
          echo "${{ steps.vars.outputs.SSH_KEY }}" > key.pem
          chmod 600 key.pem

          echo "--- Creating tarball of rollback build artifact ---"
          tar -czf next_rollback_build.tar.gz ./.next
          echo "--- Tarball created ---"

          echo "--- Transferring rollback build artifact to EC2 ---"
          scp -o StrictHostKeyChecking=no -i key.pem next_rollback_build.tar.gz ${{ secrets.DEPLOY_USER }}@${{ steps.vars.outputs.SERVER_IP }}:/tmp/next_rollback_build.tar.gz
          echo "--- Artifact transferred ---"

          echo "--- Executing rollback commands on EC2 ---"
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.DEPLOY_USER }}@${{ steps.vars.outputs.SERVER_IP }} << EOF
            APP_DIR="${{ steps.vars.outputs.APP_DIR }}"
            BUILD_TARBALL="/tmp/next_rollback_build.tar.gz"

            echo "Server: Starting rollback for \${APP_DIR} to tag: ${{ github.event.inputs.rollback_tag }}"

            # No backup during rollback, as we are already restoring a known good state.
            # If you want to backup the current (potentially broken) state before rollback,
            # you can add similar backup logic here as in the deploy job.

            echo "Server: Extracting rollback build artifact from \$BUILD_TARBALL to \$APP_DIR"
            rm -rf "\$APP_DIR/.next" # Remove current (potentially problematic) .next
            tar -xzf "\$BUILD_TARBALL" -C "\$APP_DIR" # Extract rollback .next

            echo "Server: Cleaning up rollback tarball"
            rm "\$BUILD_TARBALL"

            echo "Server: Restarting application 'your-app' via PM2..."
            pm2 restart your-app || (echo "Server: PM2 process 'your-app' not found. Attempting to start." && pm2 start --name your-app "npm run start" --cwd "\$APP_DIR") || echo "Server: Failed to manage PM2 process during rollback."

            echo "Server: Rollback process completed."
          EOF
          echo "--- Rollback to EC2 finished ---"
          rm key.pem