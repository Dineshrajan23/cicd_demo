name: Frontend CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - staging
      - main
  workflow_dispatch:
    inputs:
      rollback_tag:
        description: 'Git tag to rollback to'
        required: false

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci
        
      - name: Run Lint
        run: npm run lint

      - name: Build
        run: |
            npm run build
            echo "Build completed successfully."
            ls -la
            ls -la .next || echo ".next directory not found!"
        

    #   - name: Run Tests
    #     run: npm test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ./.next
          if-no-files-found: error

  deploy:
    name: Deploy to Environment
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || (github.ref == 'refs/heads/staging' && 'staging' || 'development') }}
      url: ${{ github.ref == 'refs/heads/main' && 'https://your-production-url.com' || github.ref == 'refs/heads/staging' && 'https://your-staging-url.com' || 'https://your-dev-url.com' }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build

      - name: Set deploy variables
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/dev" ]]; then
            echo "DEPLOY_ENV=dev" >> $GITHUB_OUTPUT
            echo "SERVER_IP=${{ secrets.DEV_SERVER_IP }}" >> $GITHUB_OUTPUT
            echo "SSH_KEY=${{ secrets.DEV_EC2_SSH_KEY }}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == "refs/heads/staging" ]]; then
            echo "DEPLOY_ENV=staging" >> $GITHUB_OUTPUT
            echo "SERVER_IP=${{ secrets.STAGING_SERVER_IP }}" >> $GITHUB_OUTPUT
            echo "SSH_KEY=${{ secrets.STAGING_EC2_SSH_KEY }}" >> $GITHUB_OUTPUT
          else
            echo "DEPLOY_ENV=prod" >> $GITHUB_OUTPUT
            echo "SERVER_IP=${{ secrets.PROD_SERVER_IP }}" >> $GITHUB_OUTPUT
            echo "SSH_KEY=${{ secrets.PROD_EC2_SSH_KEY }}" >> $GITHUB_OUTPUT
          fi

      - name: Save Git Tag (production only)
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions"
          git config user.email "ci@github.com"
          git tag "release-$(date +'%Y%m%d%H%M%S')"
          git push origin --tags

      - name: Deploy to EC2
        run: |
          echo "${{ steps.vars.outputs.SSH_KEY }}" > key.pem
          chmod 600 key.pem

          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.DEPLOY_USER }}@${{ steps.vars.outputs.SERVER_IP }} << 'EOF'
            TIMESTAMP=$(date +'%Y%m%d%H%M%S')
            BACKUP_DIR=~/backup/frontend-$TIMESTAMP
            mkdir -p "$BACKUP_DIR"
            cp -r /var/www/your-app/.next "$BACKUP_DIR" 2>/dev/null || echo ".next folder not found, skipping backup"

            cd /var/www/your-app
            git pull origin ${{ steps.vars.outputs.DEPLOY_ENV }}
            npm install
            npm run build
            pm2 restart your-app || npm run start &
          EOF


  rollback:
    name: Rollback Deployment
    if: github.event.inputs.rollback_tag != ''
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.rollback_tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install & Build for Rollback
        run: |
          npm ci
          npm run build

      - name: Deploy Rollback Build to Production
        run: |
          echo "${{ secrets.PROD_EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.DEPLOY_USER }}@${{ secrets.PROD_SERVER_IP }} << 'EOF'
            cd /var/www/your-app
            git reset --hard ${{ github.event.inputs.rollback_tag }}
            npm install
            npm run build
            pm2 restart your-app || npm run start &
          EOF