name: Frontend CI/CD Pipeline (Dockerized)

on:
  push:
    branches:
      - dev
      - staging
      - production
  pull_request:
    branches:
      - dev
      - staging
      - production
  workflow_dispatch:
    inputs:
      rollback_tag:
        description: 'Git tag to rollback to for Production environment'
        required: false
        type: string
        default: ''
      environment:
        description: 'Target environment for rollback (e.g., dev, staging, production)'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
        default: 'production'

permissions:
  contents: read
  actions: write
  pull-requests: write
  deployments: write

jobs:
  build_and_push_docker_image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1 

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set Image Tag and ECR URI
        id: image_vars
        run: |
          # Use SHA as tag for unique identification, useful for rollback/history
          IMAGE_TAG="${{ github.sha }}"
          ECR_URI="${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_NAME }}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "ECR_URI=$ECR_URI" >> $GITHUB_OUTPUT
          echo "Building image: $ECR_URI:$IMAGE_TAG"

      - name: Build and push Docker image to ECR
        run: |
          docker build -t ${{ steps.image_vars.outputs.ECR_URI }}:${{ steps.image_vars.outputs.IMAGE_TAG }} .
          docker push ${{ steps.image_vars.outputs.ECR_URI }}:${{ steps.image_vars.outputs.IMAGE_TAG }}

          # For 'latest' tag, only push on main branch
          if [[ "${{ github.ref }}" == "refs/heads/production" ]]; then
            docker tag ${{ steps.image_vars.outputs.ECR_URI }}:${{ steps.image_vars.outputs.IMAGE_TAG }} ${{ steps.image_vars.outputs.ECR_URI }}:latest
            docker push ${{ steps.image_vars.outputs.ECR_URI }}:latest
            echo "Pushed latest tag for production."
          fi

  deploy:
    name: Deploy Docker Image to ${{ github.ref == 'refs/heads/production' && 'Production' || (github.ref == 'refs/heads/staging' && 'Staging' || 'Development') }}
    needs: build_and_push_docker_image 
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/production' && 'production' || (github.ref == 'refs/heads/staging' && 'staging' || 'development') }}
      url: ${{ github.ref == 'refs/heads/production' && 'https://production-url.com' || github.ref == 'refs/heads/staging' && 'https://staging-url.com' || 'https://dev-url.com' }} 

    steps:
      - name: Set deployment variables
        id: vars
        run: |
          echo "--- Setting deployment variables based on branch ---"
          if [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            echo "SERVER_IP=${{ secrets.DEV_SERVER_IP }}" >> $GITHUB_OUTPUT
            echo "SSH_KEY=${{ secrets.DEV_EC2_SSH_KEY }}" >> $GITHUB_OUTPUT
            echo "CONTAINER_NAME=nextjs-dev" >> $GITHUB_OUTPUT # Unique name for container
            echo "APP_PORT=3000" >> $GITHUB_OUTPUT # Internal app port
            echo "HOST_PORT=3000" >> $GITHUB_OUTPUT # Host port to map
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "SERVER_IP=${{ secrets.STAGING_SERVER_IP }}" >> $GITHUB_OUTPUT
            echo "SSH_KEY=${{ secrets.STAGING_EC2_SSH_KEY }}" >> $GITHUB_OUTPUT
            echo "CONTAINER_NAME=nextjs-staging" >> $GITHUB_OUTPUT
            echo "APP_PORT=3000" >> $GITHUB_OUTPUT
            echo "HOST_PORT=3000" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/production" ]]; then
            echo "SERVER_IP=${{ secrets.PROD_SERVER_IP }}" >> $GITHUB_OUTPUT
            echo "SSH_KEY=${{ secrets.PROD_EC2_SSH_KEY }}" >> $GITHUB_OUTPUT
            echo "CONTAINER_NAME=nextjs-prod" >> $GITHUB_OUTPUT
            echo "APP_PORT=3000" >> $GITHUB_OUTPUT
            echo "HOST_PORT=80" >> $GITHUB_OUTPUT # Production usually uses port 80/443
          else
            echo "Unknown branch ref: ${{ github.ref }}. Exiting."
            exit 1
          fi
          # Get image URI and tag from the build_and_push_docker_image job's outputs
          echo "ECR_URI=${{ needs.build_and_push_docker_image.outputs.ECR_URI }}" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=${{ needs.build_and_push_docker_image.outputs.IMAGE_TAG }}" >> $GITHUB_OUTPUT
          echo "--- Deployment variables set ---"

      - name: Deploy Docker container to EC2 via SSH
        run: |
          echo "--- Starting Docker deployment to EC2 instance: ${{ steps.vars.outputs.SERVER_IP }} ---"
          echo "${{ steps.vars.outputs.SSH_KEY }}" > key.pem
          chmod 600 key.pem

          IMAGE_TO_DEPLOY="${{ steps.vars.outputs.ECR_URI }}:${{ steps.vars.outputs.IMAGE_TAG }}"
          CONTAINER_NAME="${{ steps.vars.outputs.CONTAINER_NAME }}"
          HOST_PORT="${{ steps.vars.outputs.HOST_PORT }}"
          APP_PORT="${{ steps.vars.outputs.APP_PORT }}"

          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.DEPLOY_USER }}@${{ steps.vars.outputs.SERVER_IP }} << EOF
            echo "Server: Pulling Docker image: \${IMAGE_TO_DEPLOY}"
            docker pull "\${IMAGE_TO_DEPLOY}"

            echo "Server: Stopping and removing old container (if exists): \${CONTAINER_NAME}"
            docker stop "\${CONTAINER_NAME}" || true
            docker rm "\${CONTAINER_NAME}" || true

            echo "Server: Running new container: \${CONTAINER_NAME} on port \${HOST_PORT}:\${APP_PORT}"
            # Run the new container, mapping host port to container port
            # Add any necessary environment variables for your app here using -e
            docker run -d \
              --name "\${CONTAINER_NAME}" \
              -p "\${HOST_PORT}":"\${APP_PORT}" \
              -e "NODE_ENV=production" \
              -e "NEXT_PUBLIC_API_URL=https://api-url.com" \ 
              "\${IMAGE_TO_DEPLOY}"

            echo "Server: Cleaning up old Docker images to free space"
            docker image prune -f

            echo "Server: Docker deployment process completed successfully."
          EOF
          echo "--- Docker deployment to EC2 finished ---"
          rm key.pem